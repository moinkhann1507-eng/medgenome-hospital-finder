<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLoc AI — Intelligent Hospital Architecture Finder</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0a0f0d;
    --bg-elevated: #111a16;
    --card: #152019;
    --border: #1e3329;
    --fg: #e8f0ec;
    --muted: #7a9b8a;
    --accent: #00e68a;
    --accent-dim: #00b36b;
    --accent-glow: rgba(0, 230, 138, 0.15);
    --danger: #ff5c5c;
    --warning: #ffb347;
    --info: #47b8ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Architectural grid background */
  .arch-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(0,230,138,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,230,138,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at 50% 30%, black 20%, transparent 70%);
  }

  .arch-grid::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(0,230,138,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0,179,107,0.04) 0%, transparent 50%);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

  /* Search input */
  .search-input {
    background: var(--bg-elevated);
    border: 1.5px solid var(--border);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    transition: all 0.3s ease;
  }
  .search-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow), 0 0 30px var(--accent-glow);
  }
  .search-input::placeholder { color: var(--muted); opacity: 0.6; }

  /* Filter chips */
  .chip {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s ease;
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent-dim); color: var(--fg); }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 600;
    box-shadow: 0 0 15px var(--accent-glow);
  }

  /* Hospital cards */
  .hospital-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .hospital-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .hospital-card:hover {
    border-color: var(--accent-dim);
    transform: translateX(4px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .hospital-card:hover::before { opacity: 1; }
  .hospital-card.active {
    border-color: var(--accent);
    background: rgba(0,230,138,0.05);
    box-shadow: 0 0 25px var(--accent-glow);
  }
  .hospital-card.active::before { opacity: 1; }

  /* Rating stars */
  .star-filled { color: var(--warning); }
  .star-empty { color: var(--border); }

  /* Type badge */
  .type-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Map container */
  #map {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    z-index: 1;
  }
  .leaflet-tile-pane { filter: saturate(0.3) brightness(0.35) contrast(1.2); }
  .leaflet-control-zoom a {
    background: var(--card) !important;
    color: var(--fg) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-attribution { display: none !important; }

  /* Custom marker */
  .custom-marker {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 15px rgba(0,230,138,0.5);
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .custom-marker i {
    transform: rotate(45deg);
    color: var(--bg);
    font-size: 14px;
  }
  .custom-marker.active-marker {
    background: var(--warning);
    box-shadow: 0 0 25px rgba(255,179,71,0.6);
    width: 44px; height: 44px;
  }
  .custom-marker.active-marker i { font-size: 16px; }

  /* Pulse animation for markers */
  .marker-pulse {
    position: absolute;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,230,138,0.3);
    animation: pulse 2s ease-out infinite;
    top: 0; left: 0;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(3); opacity: 0; }
  }

  /* AI Processing animation */
  .ai-processing {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    padding: 4px 10px;
    background: var(--accent-glow);
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
  }
  .ai-dot {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: aiBounce 1.4s ease-in-out infinite;
  }
  .ai-dot:nth-child(2) { animation-delay: 0.2s; }
  .ai-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes aiBounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    z-index: 10000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    max-width: 360px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Detail panel */
  .detail-panel {
    position: fixed;
    top: 0; right: 0;
    width: 420px;
    max-width: 90vw;
    height: 100vh;
    background: var(--bg-elevated);
    border-left: 1px solid var(--border);
    z-index: 1000;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    overflow-y: auto;
    box-shadow: -10px 0 40px rgba(0,0,0,0.5);
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .detail-overlay.open { opacity: 1; pointer-events: all; }

  /* Stats counter animation */
  .stat-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  /* Suggestion dropdown */
  .suggestions {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 6px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .suggestions.visible { display: block; }
  .suggestion-item {
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
  }
  .suggestion-item:hover { background: var(--accent-glow); }
  .suggestion-item:first-child { border-radius: 10px 10px 0 0; }
  .suggestion-item:last-child { border-radius: 0 0 10px 10px; }

  /* Floating elements */
  .float-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: floatOrb 8s ease-in-out infinite alternate;
  }
  @keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, -20px) scale(1.1); }
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  /* Responsive */
  @media (max-width: 1024px) {
    .main-grid { grid-template-columns: 1fr !important; }
    .map-section { height: 350px !important; }
  }

  /* Smooth load */
  .fade-in { animation: fadeIn 0.6s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Scanline effect on header */
  .scanline::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanMove 4s linear infinite;
  }
  @keyframes scanMove {
    0% { top: 0; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
</style>
</head>
<body>

<!-- Architectural grid background -->
<div class="arch-grid"></div>

<!-- Floating orbs -->
<div class="float-orb" style="width:300px;height:300px;background:rgba(0,230,138,0.05);top:10%;left:5%;"></div>
<div class="float-orb" style="width:250px;height:250px;background:rgba(0,179,107,0.04);bottom:20%;right:10%;animation-delay:-3s;"></div>

<!-- Toast -->
<div id="toast" class="toast">
  <div class="flex items-center gap-3">
    <i id="toastIcon" class="fa-solid fa-circle-check" style="color:var(--accent)"></i>
    <span id="toastMsg" class="text-sm" style="color:var(--fg)"></span>
  </div>
</div>

<!-- Detail overlay -->
<div id="detailOverlay" class="detail-overlay" onclick="closeDetail()"></div>

<!-- Detail panel -->
<div id="detailPanel" class="detail-panel">
  <div class="p-6">
    <div class="flex justify-between items-start mb-6">
      <div class="ai-processing">
        <span>AI ANALYSIS</span>
        <div class="ai-dot"></div>
        <div class="ai-dot"></div>
        <div class="ai-dot"></div>
      </div>
      <button onclick="closeDetail()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/10 transition-colors">
        <i class="fa-solid fa-xmark" style="color:var(--muted)"></i>
      </button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- Main app -->
<div class="relative z-10 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="relative overflow-hidden" style="background:var(--bg-elevated);border-bottom:1px solid var(--border);">
    <div class="scanline absolute inset-0 pointer-events-none"></div>
    <div class="max-w-[1440px] mx-auto px-6 py-5 flex items-center justify-between relative z-10">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:var(--accent);box-shadow:0 0 20px var(--accent-glow);">
          <i class="fa-solid fa-hospital" style="color:var(--bg);font-size:18px;"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight" style="color:var(--fg);">MedLoc <span style="color:var(--accent);">AI</span></h1>
          <p class="text-xs" style="color:var(--muted);font-family:'JetBrains Mono',monospace;">Intelligent Hospital Architecture Finder</p>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <div class="hidden md:flex items-center gap-6 text-xs" style="font-family:'JetBrains Mono',monospace;color:var(--muted);">
          <span><span style="color:var(--accent);" id="totalCount">0</span> FACILITIES</span>
          <span><span style="color:var(--accent);" id="countryCount">0</span> COUNTRIES</span>
          <span><span style="color:var(--accent);" id="typeCount">0</span> SPECIALTIES</span>
        </div>
        <button id="geoBtn" onclick="geoLocate()" class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all hover:scale-105" style="background:var(--accent-glow);border:1px solid var(--accent-dim);color:var(--accent);">
          <i class="fa-solid fa-location-crosshairs"></i>
          <span>Near Me</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Search section -->
  <section class="max-w-[1440px] mx-auto w-full px-6 pt-6 pb-4">
    <div class="relative">
      <div class="flex gap-3">
        <div class="relative flex-1">
          <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2" style="color:var(--muted);"></i>
          <input
            id="searchInput"
            type="text"
            class="search-input w-full pl-11 pr-12 py-4 rounded-xl text-base"
            placeholder="Ask AI: 'Find cardiac hospitals in New York' or 'Emergency near Tokyo'..."
            autocomplete="off"
            oninput="handleSearch()"
            onkeydown="handleKeydown(event)"
            onfocus="showSuggestions()"
          >
          <button id="clearBtn" onclick="clearSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-6 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors" style="display:none;">
            <i class="fa-solid fa-xmark text-xs" style="color:var(--muted);"></i>
          </button>
          <div id="suggestions" class="suggestions"></div>
        </div>
        <button onclick="executeSearch()" class="px-6 py-4 rounded-xl font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98]" style="background:var(--accent);color:var(--bg);box-shadow:0 0 20px var(--accent-glow);">
          <i class="fa-solid fa-microchip mr-2"></i>Analyze
        </button>
      </div>

      <!-- Filter chips -->
      <div class="flex gap-2 mt-4 overflow-x-auto pb-2" id="filterChips" style="-webkit-overflow-scrolling:touch;">
        <div class="chip active" data-filter="all" onclick="setFilter('all', this)">All Types</div>
        <div class="chip" data-filter="general" onclick="setFilter('general', this)"><i class="fa-solid fa-hospital mr-1"></i>General</div>
        <div class="chip" data-filter="cardiac" onclick="setFilter('cardiac', this)"><i class="fa-solid fa-heart-pulse mr-1"></i>Cardiac</div>
        <div class="chip" data-filter="pediatric" onclick="setFilter('pediatric', this)"><i class="fa-solid fa-baby mr-1"></i>Pediatric</div>
        <div class="chip" data-filter="orthopedic" onclick="setFilter('orthopedic', this)"><i class="fa-solid fa-bone mr-1"></i>Orthopedic</div>
        <div class="chip" data-filter="neuro" onclick="setFilter('neuro', this)"><i class="fa-solid fa-brain mr-1"></i>Neurological</div>
        <div class="chip" data-filter="oncology" onclick="setFilter('oncology', this)"><i class="fa-solid fa-ribbon mr-1"></i>Oncology</div>
        <div class="chip" data-filter="trauma" onclick="setFilter('trauma', this)"><i class="fa-solid fa-truck-medical mr-1"></i>Trauma</div>
        <div class="chip" data-filter="maternity" onclick="setFilter('maternity', this)"><i class="fa-solid fa-person-pregnant mr-1"></i>Maternity</div>
        <div class="chip" data-filter="psychiatric" onclick="setFilter('psychiatric', this)"><i class="fa-solid fa-comments mr-1"></i>Psychiatric</div>
      </div>
    </div>

    <!-- AI insight bar -->
    <div id="aiInsight" class="mt-4 p-3 rounded-lg flex items-center gap-3 text-sm" style="background:var(--accent-glow);border:1px solid rgba(0,230,138,0.15);display:none;">
      <i class="fa-solid fa-robot" style="color:var(--accent);"></i>
      <span id="aiInsightText" style="color:var(--muted);"></span>
    </div>
  </section>

  <!-- Main content grid -->
  <main class="flex-1 max-w-[1440px] mx-auto w-full px-6 pb-6">
    <div class="main-grid grid gap-5" style="grid-template-columns: 400px 1fr; height: calc(100vh - 240px); min-height: 500px;">

      <!-- Results list -->
      <div class="flex flex-col overflow-hidden rounded-xl" style="background:var(--bg-elevated);border:1px solid var(--border);">
        <div class="px-4 py-3 flex items-center justify-between" style="border-bottom:1px solid var(--border);">
          <span class="text-xs font-medium" style="font-family:'JetBrains Mono',monospace;color:var(--muted);">
            RESULTS <span id="resultCount" style="color:var(--accent);">0</span>
          </span>
          <div class="flex items-center gap-2">
            <button onclick="sortResults('rating')" class="text-xs px-2 py-1 rounded hover:bg-white/5 transition-colors" style="color:var(--muted);">
              <i class="fa-solid fa-arrow-down-wide-short mr-1"></i>Rating
            </button>
            <button onclick="sortResults('name')" class="text-xs px-2 py-1 rounded hover:bg-white/5 transition-colors" style="color:var(--muted);">
              <i class="fa-solid fa-arrow-down-a-z mr-1"></i>Name
            </button>
          </div>
        </div>
        <div id="resultsList" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>
      </div>

      <!-- Map section -->
      <div class="map-section relative overflow-hidden rounded-xl" style="border:1px solid var(--border);">
        <div id="map"></div>
        <!-- Map overlay stats -->
        <div class="absolute top-4 left-4 z-[500] p-3 rounded-lg" style="background:rgba(10,15,13,0.85);border:1px solid var(--border);backdrop-filter:blur(10px);">
          <div class="flex gap-5">
            <div>
              <div class="stat-number" id="mapStatShown">0</div>
              <div class="text-xs mt-1" style="color:var(--muted);font-family:'JetBrains Mono',monospace;">ON MAP</div>
            </div>
            <div>
              <div class="stat-number" id="mapStatAvg">0</div>
              <div class="text-xs mt-1" style="color:var(--muted);font-family:'JetBrains Mono',monospace;">AVG RATING</div>
            </div>
          </div>
        </div>
        <!-- Map legend -->
        <div class="absolute bottom-4 left-4 z-[500] p-3 rounded-lg" style="background:rgba(10,15,13,0.85);border:1px solid var(--border);backdrop-filter:blur(10px);">
          <div class="text-xs mb-2 font-medium" style="color:var(--muted);font-family:'JetBrains Mono',monospace;">LEGEND</div>
          <div class="flex flex-col gap-1.5">
            <div class="flex items-center gap-2 text-xs" style="color:var(--fg);">
              <div class="w-3 h-3 rounded-full" style="background:var(--accent);"></div> Hospital Location
            </div>
            <div class="flex items-center gap-2 text-xs" style="color:var(--fg);">
              <div class="w-3 h-3 rounded-full" style="background:var(--warning);"></div> Selected
            </div>
            <div class="flex items-center gap-2 text-xs" style="color:var(--fg);">
              <div class="w-3 h-3 rounded-full" style="background:var(--info);"></div> Your Location
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ============================================================
// HOSPITAL DATABASE — 60+ real hospitals across the world
// ============================================================
const hospitals = [
  // United States
  { id:1, name:"Mayo Clinic", address:"200 First St SW", city:"Rochester", state:"Minnesota", country:"USA", lat:44.0234, lng:-92.4655, type:"general", specialty:"Multi-Specialty", phone:"+1 507-284-2511", rating:4.9, beds:1265, emergency:true, founded:1889 },
  { id:2, name:"Cleveland Clinic", address:"9500 Euclid Ave", city:"Cleveland", state:"Ohio", country:"USA", lat:41.5048, lng:-81.6109, type:"cardiac", specialty:"Cardiology & Heart Surgery", phone:"+1 216-444-2200", rating:4.8, beds:1246, emergency:true, founded:1921 },
  { id:3, name:"Johns Hopkins Hospital", address:"1800 Orleans St", city:"Baltimore", state:"Maryland", country:"USA", lat:39.2962, lng:-76.5932, type:"general", specialty:"Research & Multi-Specialty", phone:"+1 410-955-5000", rating:4.8, beds:1071, emergency:true, founded:1889 },
  { id:4, name:"Massachusetts General Hospital", address:"55 Fruit St", city:"Boston", state:"Massachusetts", country:"USA", lat:42.3626, lng:-71.0700, type:"general", specialty:"General & Research", phone:"+1 617-726-2000", rating:4.7, beds:999, emergency:true, founded:1811 },
  { id:5, name:"New York-Presbyterian Hospital", address:"622 W 168th St", city:"New York", state:"New York", country:"USA", lat:40.8420, lng:-73.9400, type:"general", specialty:"Academic Medical Center", phone:"+1 212-305-2500", rating:4.7, beds:2265, emergency:true, founded:1868 },

  psychiatric: ['psychiatric','mental health','psychology','depression','anxiety','bipolar','schizophrenia','therapy']
};

const cityAliases = {
  'nyc':'new york','la':'los angeles','sf':'san francisco','dc':'washington',
  'tokyo':'tokyo','delhi':'new delhi','mumbai':'mumbai','bangalore':'bangalore','bengaluru':'bangalore',

  'dubai':'abu dhabi','toronto':'toronto','melbourne':'melbourne','chicago':'chicago',
  'houston':'houston','boston':'boston','baltimore':'baltimore','pittsburgh':'pittsburgh'
};

// Levenshtein distance for fuzzy matching
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = Math.min(
        dp[i-1][j] + 1,
        dp[i][j-1] + 1,
        dp[i-1][j-1] + (a[i-1] !== b[j-1] ? 1 : 0)
      );
    }
  }
  return dp[m][n];
}

// Fuzzy match score (0-1, 1 = perfect)
function fuzzyScore(query, target) {
  const q = query.toLowerCase();
  const t = target.toLowerCase();
  if (t.includes(q)) return 1;
  if (q.split(' ').every(w => t.includes(w))) return 0.95;
  const dist = levenshtein(q, t);
  const maxLen = Math.max(q.length, t.length);
  return Math.max(0, 1 - dist / maxLen);
}

// Parse natural language query
function parseQuery(query) {
  const q = query.toLowerCase().trim();
  let detectedType = null;
  let detectedCity = null;
  let detectedCountry = null;
  let detectedName = null;
  let isEmergency = false;

  // Check for emergency keywords
  if (/\b(emergency|urgent|nearest|closest|now|immediate)\b/.test(q)) {
    isEmergency = true;
  }

  // Detect hospital type from keywords
  for (const [type, keywords] of Object.entries(typeKeywords)) {
    for (const kw of keywords) {
      if (q.includes(kw)) {
        detectedType = type;
        break;
      }
    }
    if (detectedType) break;
  }

  // Detect city
  for (const [alias, city] of Object.entries(cityAliases)) {
    if (q.includes(alias)) {
      detectedCity = city;
      break;
    }
  }
  if (!detectedCity) {
    for (const h of hospitals) {
      if (q.includes(h.city.toLowerCase()) && !detectedCity) {
        detectedCity = h.city;
        break;
      }
    }
  }

  // Detect country
  const countryNames = [...new Set(hospitals.map(h => h.country.toLowerCase()))];
  for (const c of countryNames) {
    if (q.includes(c)) {
      detectedCountry = c;
      break;
    }
  }
  // Country aliases
  if (q.includes('us') || q.includes('usa') || q.includes('america')) detectedCountry = 'usa';
  if (q.includes('uk') || q.includes('england') || q.includes('britain')) detectedCountry = 'uk';
  if (q.includes('uae') || q.includes('emirates')) detectedCountry = 'uae';

  // Detect specific hospital name
  const nameWords = q.replace(/\b(find|hospital|in|near|at|the|a|an|show|get|locate|search|for|me|my|any|all|best|top|good)\b/g, '').trim();
  if (nameWords.length > 3) {
    for (const h of hospitals) {
      if (fuzzyScore(nameWords, h.name) > 0.6) {
        detectedName = h.name;
        break;
      }
    }
  }

  return { detectedType, detectedCity, detectedCountry, detectedName, isEmergency };
}

// Score a hospital against parsed query
function scoreHospital(hospital, parsed) {
  let score = 0;

  if (parsed.detectedName) {
    score += fuzzyScore(parsed.detectedName, hospital.name) * 100;
    return score; // Name match is definitive
  }

  if (parsed.detectedType && hospital.type === parsed.detectedType) score += 40;
  if (parsed.detectedCity && hospital.city.toLowerCase() === parsed.detectedCity.toLowerCase()) score += 35;
  if (parsed.detectedCountry && hospital.country.toLowerCase() === parsed.detectedCountry.toLowerCase()) score += 25;
  if (parsed.isEmergency && hospital.emergency) score += 20;

  // Fuzzy name matching against query terms
  const terms = document.getElementById('searchInput').value.toLowerCase().split(/\s+/).filter(w => w.length > 2);
  for (const term of terms) {
    if (['find','hospital','near','in','the','show','best','top','any','all','get','locate','search','for','me','my'].includes(term)) continue;
    score += fuzzyScore(term, hospital.name) * 8;
    score += fuzzyScore(term, hospital.city) * 6;
    score += fuzzyScore(term, hospital.specialty.toLowerCase()) * 5;
    score += fuzzyScore(term, hospital.type) * 4;
  }

  // Bonus for rating
  score += hospital.rating * 2;

  return score;
}

let currentFilter = 'all';

// ============================================================
// MAP INITIALIZATION
// ============================================================
function initMap() {
  map = L.map('map', {
    center: [25, 10],
    zoom: 2,
    minZoom: 2,
    maxZoom: 18,
    zoomControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Show all hospitals initially
  showAllHospitals();
}

function createMarkerIcon(isActive) {
  const div = document.createElement('div');
  div.style.position = 'relative';
  const marker = document.createElement('div');
  marker.className = 'custom-marker' + (isActive ? ' active-marker' : '');
  marker.innerHTML = '<i class="fa-solid fa-hospital"></i>';
  div.appendChild(marker);
  if (!isActive) {
    const pulse = document.createElement('div');
    pulse.className = 'marker-pulse';
    div.appendChild(pulse);
  }
  return L.divIcon({
    html: div.outerHTML,
    className: '',
    iconSize: [isActive ? 44 : 36, isActive ? 44 : 36],
    iconAnchor: [isActive ? 22 : 18, isActive ? 44 : 36],
    popupAnchor: [0, -40]
  });
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function showHospitalsOnMap(hospitalsToShow) {
  clearMarkers();
  hospitalsToShow.forEach(h => {
    const isActive = selectedHospital && selectedHospital.id === h.id;
    const marker = L.marker([h.lat, h.lng], { icon: createMarkerIcon(isActive) })
      .addTo(map)
      .on('click', () => selectHospital(h));
    markers.push(marker);
  });
  document.getElementById('mapStatShown').textContent = hospitalsToShow.length;
  const avgRating = hospitalsToShow.length
    ? (hospitalsToShow.reduce((s, h) => s + h.rating, 0) / hospitalsToShow.length).toFixed(1)
    : '0';
  document.getElementById('mapStatAvg').textContent = avgRating;
}

function showAllHospitals() {
  currentResults = [...hospitals];
  renderResults(currentResults);
  showHospitalsOnMap(currentResults);
  fitMapToHospitals(currentResults);
}

function fitMapToHospitals(list) {
  if (list.length === 0) return;
  if (list.length === 1) {
    map.setView([list[0].lat, list[0].lng], 12);
    return;
  }
  const bounds = L.latLngBounds(list.map(h => [h.lat, h.lng]));
  map.fitBounds(bounds, { padding: [50, 50], maxZoom: 12 });
}

// ============================================================
// SEARCH & FILTER LOGIC
// ============================================================
function handleSearch() {
  const val = document.getElementById('searchInput').value;
  document.getElementById('clearBtn').style.display = val.length > 0 ? 'flex' : 'none';
  showSuggestions();
}

function showSuggestions() {
  const val = document.getElementById('searchInput').value.toLowerCase().trim();
  const box = document.getElementById('suggestions');
  if (val.length < 2) { box.classList.remove('visible'); return; }

  // Generate smart suggestions
  const suggestions = [];
  const parsed = parseQuery(val);

  // Match hospital names
  hospitals.forEach(h => {
    const score = fuzzyScore(val, h.name);
    if (score > 0.4) suggestions.push({ text: h.name, sub: `${h.city}, ${h.country}`, icon: 'fa-hospital', action: 'name', data: h.name, score });
  });

  // Match cities
  const cities = [...new Set(hospitals.map(h => h.city))];
  cities.forEach(c => {
    if (fuzzyScore(val, c) > 0.5 && !suggestions.find(s => s.text === c)) {
      const count = hospitals.filter(h => h.city === c).length;
      suggestions.push({ text: c, sub: `${count} hospitals`, icon: 'fa-city', action: 'city', data: c, score: 0.5 });
    }
  });

  // Match countries
  const countries = [...new Set(hospitals.map(h => h.country))];
  countries.forEach(c => {
    if (c.toLowerCase().includes(val) && !suggestions.find(s => s.text === c)) {
      const count = hospitals.filter(h => h.country === c).length;
      suggestions.push({ text: c, sub: `${count} hospitals`, icon: 'fa-globe', action: 'country', data: c, score: 0.4 });
    }
  });

  // Match types
  if (!parsed.detectedType) {
    for (const [type, keywords] of Object.entries(typeKeywords)) {
      if (keywords.some(k => val.includes(k))) {
        const count = hospitals.filter(h => h.type === type).length;
        if (!suggestions.find(s => s.action === 'type' && s.data === type)) {
          suggestions.push({ text: type.charAt(0).toUpperCase() + type.slice(1) + ' Hospitals', sub: `${count} facilities`, icon: 'fa-tag', action: 'type', data: type, score: 0.3 });
        }
      }
    }
  }

  suggestions.sort((a, b) => b.score - a.score);
  const top = suggestions.slice(0, 6);

  if (top.length === 0) { box.classList.remove('visible'); return; }

  box.innerHTML = top.map((s, i) => `
    <div class="suggestion-item" onclick="applySuggestion('${s.action}', '${s.data.replace(/'/g, "\\'")}')">
      <i class="fa-solid ${s.icon}" style="color:var(--accent);width:16px;text-align:center;"></i>
      <div>
        <div style="color:var(--fg);font-size:0.85rem;">${s.text}</div>
        <div style="color:var(--muted);font-size:0.7rem;">${s.sub}</div>
      </div>
    </div>
  `).join('');
  box.classList.add('visible');
}

function applySuggestion(action, data) {
  const input = document.getElementById('searchInput');
  document.getElementById('suggestions').classList.remove('visible');

  if (action === 'name') {
    input.value = data;
    executeSearch();
  } else if (action === 'city') {
    input.value = `hospitals in ${data}`;
    executeSearch();
  } else if (action === 'country') {
    input.value = `hospitals in ${data}`;
    executeSearch();
  } else if (action === 'type') {
    setFilter(data, document.querySelector(`.chip[data-filter="${data}"]`));
    input.value = '';
    executeSearch();
  }
}

function handleKeydown(e) {
  if (e.key === 'Enter') {
    document.getElementById('suggestions').classList.remove('visible');
    executeSearch();
  }
  if (e.key === 'Escape') {
    document.getElementById('suggestions').classList.remove('visible');
    document.getElementById('searchInput').blur();
  }
}

function executeSearch() {
  document.getElementById('suggestions').classList.remove('visible');
  const query = document.getElementById('searchInput').value.trim();

  if (!query) {
    showAllHospitals();
    hideAIInsight();
    return;
  }

  // Show AI processing feel
  showAIInsight('Analyzing your query with AI pattern matching...');

  setTimeout(() => {
    const parsed = parseQuery(query);
    let scored = hospitals.map(h => ({ ...h, score: scoreHospital(h, parsed) }));
    scored = scored.filter(h => h.score > 5);
    scored.sort((a, b) => b.score - a.score);

    // Apply type filter
    if (currentFilter !== 'all') {
      scored = scored.filter(h => h.type === currentFilter);
    }

    currentResults = scored;
    renderResults(currentResults);
    showHospitalsOnMap(currentResults);

    if (currentResults.length > 0) {
      fitMapToHospitals(currentResults);
      const parts = [];
      if (parsed.detectedType) parts.push(`type: ${parsed.detectedType}`);
      if (parsed.detectedCity) parts.push(`city: ${parsed.detectedCity}`);
      if (parsed.detectedCountry) parts.push(`country: ${parsed.detectedCountry}`);
      if (parsed.isEmergency) parts.push('emergency: yes');
      const insightMsg = parts.length > 0
        ? `Found ${currentResults.length} hospitals matching [${parts.join(', ')}]. Top result: ${currentResults[0].name} (${currentResults[0].rating}★)`
        : `Found ${currentResults.length} relevant facilities. Best match: ${currentResults[0].name}.`;
      showAIInsight(insightMsg);
    } else {
      showAIInsight('No facilities match your query. Try broadening your search terms or removing filters.');
    }
  }, 300);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('suggestions').classList.remove('visible');
  hideAIInsight();
  showAllHospitals();
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  // Re-execute current search or show all
  const query = document.getElementById('searchInput').value.trim();
  if (query) {
    executeSearch();
  } else {
    const filtered = filter === 'all' ? [...hospitals] : hospitals.filter(h => h.type === filter);
    currentResults = filtered;
    renderResults(currentResults);
    showHospitalsOnMap(currentResults);
    fitMapToHospitals(currentResults);
  }
}

function sortResults(mode) {
  sortMode = mode;
  if (mode === 'rating') {
    currentResults.sort((a, b) => b.rating - a.rating);
  } else if (mode === 'name') {
    currentResults.sort((a, b) => a.name.localeCompare(b.name));
  }
  renderResults(currentResults);
}

// ============================================================
// RENDER RESULTS
// ============================================================
function getTypeColor(type) {
  const colors = {
    general: { bg: 'rgba(71,184,255,0.15)', fg: '#47b8ff' },
    cardiac: { bg: 'rgba(255,92,92,0.15)', fg: '#ff5c5c' },
    pediatric: { bg: 'rgba(255,179,71,0.15)', fg: '#ffb347' },
    orthopedic: { bg: 'rgba(180,130,255,0.15)', fg: '#b482ff' },
    neuro: { bg: 'rgba(0,230,138,0.15)', fg: '#00e68a' },
    oncology: { bg: 'rgba(255,107,155,0.15)', fg: '#ff6b9b' },
    trauma: { bg: 'rgba(255,140,0,0.15)', fg: '#ff8c00' },
    maternity: { bg: 'rgba(255,182,193,0.15)', fg: '#ffb6c1' },
    psychiatric: { bg: 'rgba(147,176,255,0.15)', fg: '#93b0ff' }
  };
  return colors[type] || colors.general;
}

function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  let html = '';
  for (let i = 0; i < full; i++) html += '<i class="fa-solid fa-star star-filled"></i>';
  if (half) html += '<i class="fa-solid fa-star-half-stroke star-filled"></i>';
  for (let i = 0; i < empty; i++) html += '<i class="fa-regular fa-star star-empty"></i>';
  return html;
}

function renderResults(list) {
  const container = document.getElementById('resultsList');
  document.getElementById('resultCount').textContent = list.length;

  if (list.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <i class="fa-solid fa-magnifying-glass text-4xl mb-4" style="color:var(--border);"></i>
        <p class="text-lg font-medium mb-2" style="color:var(--fg);">No hospitals found</p>
        <p class="text-sm" style="color:var(--muted);">Try different keywords or remove filters</p>
      </div>
    `;
    return;
  }

  container.innerHTML = list.map((h, i) => {
    const tc = getTypeColor(h.type);
    const isActive = selectedHospital && selectedHospital.id === h.id;
    return `
      <div class="hospital-card ${isActive ? 'active' : ''} fade-in" style="animation-delay:${Math.min(i * 0.05, 0.5)}s" onclick="selectHospital(hospitals.find(x=>x.id===${h.id}))">
        <div class="flex items-start justify-between mb-2">
          <h3 class="font-semibold text-sm leading-tight" style="color:var(--fg);flex:1;margin-right:8px;">${h.name}</h3>
          <span class="type-badge" style="background:${tc.bg};color:${tc.fg};">${h.type}</span>
        </div>
        <div class="flex items-center gap-1 mb-2">
          ${renderStars(h.rating)}
          <span class="text-xs ml-1" style="color:var(--muted);">${h.rating}</span>
        </div>
        <div class="flex items-start gap-2 mb-1.5">
          <i class="fa-solid fa-location-dot mt-0.5 text-xs" style="color:var(--accent);"></i>
          <p class="text-xs leading-relaxed" style="color:var(--muted);">${h.address}, ${h.city}${h.state ? ', ' + h.state : ''}, ${h.country}</p>
        </div>
        <div class="flex items-center gap-4 text-xs" style="color:var(--muted);">
          <span><i class="fa-solid fa-bed mr-1" style="color:var(--accent);"></i>${h.beds} beds</span>
          <span><i class="fa-solid fa-phone mr-1" style="color:var(--accent);"></i>${h.phone}</span>

// ============================================================
// GEOLOCATION
// ============================================================
function geoLocate() {
  const btn = document.getElementById('geoBtn');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><span>Locating...</span>';

  if (!navigator.geolocation) {
    showToast('Geolocation not supported by your browser', 'fa-triangle-exclamation', 'var(--warning)');
    resetGeoBtn();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;

      // Remove old user marker
      if (userMarker) map.removeLayer(userMarker);

      // Add user location marker
      const userIcon = L.divIcon({
        html: '<div style="width:16px;height:16px;background:#47b8ff;border-radius:50%;border:3px solid white;box-shadow:0 0 15px rgba(71,184,255,0.6);"></div>',
        className: '',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });
      userMarker = L.marker([latitude, longitude], { icon: userIcon }).addTo(map);

      // Calculate distances and sort
      const withDist = hospitals.map(h => ({
        ...h,
        distance: getDistance(latitude, longitude, h.lat, h.lng)
      })).sort((a, b) => a.distance - b.distance);

      currentResults = withDist;
      renderResults(currentResults);
      showHospitalsOnMap(currentResults);

      map.setView([latitude, longitude], 10, { animate: true });

      const nearest = withDist[0];
      const distText = nearest.distance < 1 ? `${Math.round(nearest.distance * 1000)}m` : `${nearest.distance.toFixed(1)}km`;
      showAIInsight(`Your location detected. Nearest hospital: ${nearest.name} (${distText} away). Showing ${Math.min(20, withDist.length)} nearest facilities.`);
      showToast(`Found your location. ${withDist.length} hospitals ranked by distance.`, 'fa-location-crosshairs', 'var(--info)');
      resetGeoBtn();
    },
    (err) => {
      showToast('Unable to get location: ' + err.message, 'fa-triangle-exclamation', 'var(--danger)');
      resetGeoBtn();
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function resetGeoBtn() {
  document.getElementById('geoBtn').innerHTML = '<i class="fa-solid fa-location-crosshairs"></i><span>Near Me</span>';
}

// Haversine distance in km
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

  document.getElementById('totalCount').textContent = hospitals.length;
  document.getElementById('countryCount').textContent = new Set(hospitals.map(h => h.country)).size;
  document.getElementById('typeCount').textContent = new Set(hospitals.map(h => h.type)).size;

  // Initialize map
  initMap();

  // Render all hospitals
  renderResults(hospitals);
  showHospitalsOnMap(hospitals);
}

// Start when DOM is ready
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
